<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Network Test Dashboard</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; text-align: center; }
        #box { background: #f0f0f0; padding: 20px; border-radius: 8px; margin-top: 20px; word-break: break-all; }
    </style>
</head>
<body>
    <h2>Vercel Edge Proxy Test</h2>
    <button onclick="checkProxy()">Pull Live Stream</button>
    <div id="box">Click the button to test connection.</div>

    <script>
        function checkProxy() {
            const box = document.getElementById('box');
            box.innerText = "Connecting to Edge...";

            fetch('/api/posts?_limit=1')
                .then(res => {
                    if (!res.ok) throw new Error('Status: ' + res.status);
                    return res.json();
                })
                .then(data => {
                    box.innerText = "Success! Received data: " + JSON.stringify(data[0]);
                    box.style.color = "green";
                })
                .catch(err => {
                    box.innerText = "Network Error: " + err.message + " (Check Vercel deployment logs for exact network failure context)";
                    box.style.color = "red";
                });
        }
    </script>
</body>
</html>
