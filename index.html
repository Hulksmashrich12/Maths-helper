<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Data Dashboard</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        .post { background: #f4f4f4; padding: 15px; margin-bottom: 10px; border-left: 5px solid #0070f3; border-radius: 4px; }
        h3 { margin-top: 0; text-transform: capitalize; }
    </style>
</head>
<body>
    <h1>Latest Backend Posts</h1>
    <div id="data-container">Loading live proxy stream...</div>

    <script>
        // Fetches data from your proxy route smoothly
        fetch('/api/posts?_limit=3')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('data-container');
                container.innerHTML = data.map(post => `
                    <div class="post">
                        <h3>${post.title}</h3>
                        <p>${post.body}</p>
                    </div>
                `).join('');
            })
            .catch(() => {
                document.getElementById('data-container').innerText = 'Failed to load data.';
            });
    </script>
</body>
</html>
